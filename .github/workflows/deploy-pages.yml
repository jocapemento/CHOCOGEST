name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"

      - name: Verificar build
        run: |
          test -f out/index.html
          test -f out/.nojekyll
          grep -q "ChocoGest" out/index.html

      - name: Publicar artefato (GitHub Actions)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Guardar build para branch gh-pages
        uses: actions/upload-artifact@v4
        with:
          name: chocogest-static
          path: out
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy via GitHub Actions
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-gh-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Baixar build estatico
        uses: actions/download-artifact@v4
        with:
          name: chocogest-static
          path: out

      - name: Publicar na branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true