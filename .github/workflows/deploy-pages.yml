name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Actions internas rodam em Node 24 nos runners — evita incompatibilidade forçada
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

# Não cancelar deploy em andamento (evita "Deployment failed, try again later")
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        run: npm run build:pages
        env:
          GITHUB_PAGES: "true"

      - name: Verificar build
        run: |
          touch out/.nojekyll
          test -f out/index.html
          test -f out/.nojekyll
          grep -q "ChocoGest" out/index.html

      - name: Publicar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy via GitHub Actions
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-retry:
    needs: [build, deploy]
    if: failure() && needs.deploy.result == 'failure'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Aguardar estabilização do Pages API
        run: sleep 45

      - name: Repetir deploy
        id: deployment
        uses: actions/deploy-pages@v4